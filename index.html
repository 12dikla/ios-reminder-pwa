<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Mobile / iOS basics -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Reminders" />

  <!-- Manifest (you already added in step 2) -->
  <link rel="manifest" href="./manifest.webmanifest">

  <title>Reminders</title>

  <style>
    :root { --bg:#000; --card:#1c1c1e; --accent:#0a84ff; --danger:#ff453a; --text:#fff; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 100px;
    }
    .container { width: 100%; max-width: 420px; }

    h1 { margin-top: 40px; font-size: 32px; letter-spacing: -1px; }

    .warning {
      background: #2c2c2e;
      border-left: 3px solid #ff9f0a;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      color: #8e8e93;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .input-group {
      background: var(--card);
      padding: 20px;
      border-radius: 24px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }

    input {
      width: 100%;
      background: #2c2c2e;
      border: none;
      border-radius: 12px;
      padding: 15px;
      color: white;
      font-size: 17px;
      margin-bottom: 12px;
      box-sizing: border-box;
      outline: none;
    }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }

    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 16px;
      transition: 0.2s;
      cursor: pointer;
      width: 100%;
    }
    button:active { transform: scale(0.96); opacity: 0.8; }

    .secondary { background: #3a3a3c; }

    .list { width: 100%; }
    .item {
      background: var(--card);
      padding: 18px;
      border-radius: 20px;
      margin-bottom: 12px;
      border: 1px solid #2c2c2e;
    }
    .item-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
    .time-label { font-size: 13px; color: #8e8e93; margin-top: 4px; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #2c2c2e;
      color: white;
      padding: 12px 24px;
      border-radius: 20px;
      font-size: 15px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Alarm Overlay */
    #alarmOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }
    #alarmOverlay h2 {
      color: var(--danger);
      font-size: 40px;
      margin: 0 0 10px 0;
    }
    #alarmOverlay p {
      font-size: 18px;
      color: #fff;
      margin: 0 0 18px 0;
      opacity: 0.9;
    }
    #dismissBtn {
      background: var(--danger);
      padding: 18px 56px;
      font-size: 22px;
      width: auto;
    }
  </style>
</head>

<body>
  <!-- Alarm Overlay -->
  <div id="alarmOverlay">
    <h2 id="alarmTitle">ALARM!</h2>
    <p id="alarmSub"></p>
    <button id="dismissBtn" onclick="stopAlarm()">DISMISS</button>
  </div>

  <div class="toast" id="toast"></div>

  <div class="container">
    <h1>Reminders</h1>

    <div class="warning">
      ⚠️ Important: iPhone will beep only while this app is open (iOS stops background JS). Later we’ll add Push Notifications for closed-app alerts.
    </div>

    <div class="input-group">
      <input type="text" id="taskInput" placeholder="Memo name..." />
      <input type="datetime-local" id="timeInput" />

      <div class="row">
        <button class="secondary" onclick="setQuickTime(1)">+1h</button>
        <button class="secondary" onclick="setQuickTime(2)">+2h</button>
      </div>

      <button onclick="addReminder()">Save</button>
    </div>

    <div id="list" class="list"></div>
  </div>

<script>
/* =========================
   v1 core reminders (one-time)
   ========================= */
const STORAGE_KEY = "rems_v1_core";

/* Minimum datetime: now */
function updateMinTime() {
  const now = new Date();
  const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000)
    .toISOString().slice(0, 16);
  document.getElementById("timeInput").min = local;
}
updateMinTime();
setInterval(updateMinTime, 60000);
