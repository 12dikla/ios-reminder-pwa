<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Reminders" />

  <title>Reminders</title>

  <style>
    :root {
      --bg:#000;
      --card:#1c1c1e;
      --accent:#0a84ff;
      --danger:#ff453a;
      --text:#fff;
    }

    body {
      font-family:-apple-system,sans-serif;
      background:var(--bg);
      color:var(--text);
      margin:0;
      padding:20px 20px 120px;
      display:flex;
      justify-content:center;
    }

    .container {
      width:100%;
      max-width:420px;
    }

    h1 {
      margin:40px 0 16px;
      font-size:32px;
    }

    .card {
      background:var(--card);
      padding:20px;
      border-radius:24px;
    }

    input, button {
      width:100%;
      border:none;
      border-radius:14px;
      padding:16px;
      font-size:16px;
      margin-bottom:12px;
      box-sizing:border-box;
    }

    input {
      background:#2c2c2e;
      color:white;
    }

    input[type="datetime-local"] {
      color:#fff;
    }

    button {
      font-weight:600;
      color:white;
      background:var(--accent);
    }

    .danger {
      background:var(--danger);
    }

    .secondary {
      background:#3a3a3c;
    }

    button:disabled {
      opacity:0.5;
    }

    /* Alarm */
    #alarm {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.9);
      z-index:999;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
    }

    #alarm h2 {
      font-size:38px;
      color:var(--danger);
    }

    #alarm button {
      margin-top:12px;
    }
  </style>
</head>

<body>
<div class="container">
  <h1>Reminders</h1>

  <div class="card">
    <input id="task" placeholder="Memo name…" />

    <!-- Native iOS date & time picker -->
    <input id="time" type="datetime-local" />

    <button id="startRec" class="danger" onclick="startRecording()">🎤 Start Recording</button>
    <button id="stopRec" class="secondary" onclick="stopRecording()" disabled>⏹ Stop Recording</button>

    <button onclick="save()">Save</button>
  </div>
</div>

<!-- Alarm -->
<div id="alarm">
  <h2 id="alarmTitle"></h2>
