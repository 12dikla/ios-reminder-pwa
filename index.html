<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Reminders" />
  <title>Reminders</title>

  <style>
    :root{
      --bg:#000; --card:#1c1c1e; --field:#2c2c2e;
      --accent:#0a84ff; --danger:#ff453a; --muted:#8e8e93; --text:#fff;
    }
    body{
      margin:0; padding:20px 20px 160px; background:var(--bg); color:var(--text);
      font-family:-apple-system,system-ui,sans-serif; display:flex; justify-content:center;
      -webkit-tap-highlight-color: transparent;
    }
    .container{ width:100%; max-width:420px; }
    h1{ margin:40px 0 10px; font-size:32px; }
    .build{ color:var(--muted); font-size:12px; margin-bottom:16px; }
    .card{ background:var(--card); padding:20px; border-radius:24px; }

    label{ display:block; color:var(--muted); font-size:13px; margin:6px 0 6px; }
    .hint{ color:var(--muted); font-size:12px; margin-top:-8px; margin-bottom:12px; }

    textarea,input,button{
      width:100%; box-sizing:border-box; border:none; border-radius:14px;
      padding:16px; font-size:16px; margin-bottom:12px;
    }
    textarea,input{ background:var(--field); color:var(--text); outline:none; }
    textarea{ min-height:78px; resize:none; }
    input[type="datetime-local"]{ appearance:auto; -webkit-appearance:auto; }

    .row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    button{ background:var(--accent); color:#fff; font-weight:700; }
    .danger{ background:var(--danger); }
    .secondary{ background:#3a3a3c; }
    button:disabled{ opacity:.5; }

    .list{ margin-top:16px; }
    .item{ background:var(--card); padding:16px; border-radius:18px; margin-bottom:12px; border:1px solid #2c2c2e; }
    .time{ color:var(--muted); font-size:13px; margin-top:4px; }
    .btnSmall{
      width:auto; padding:8px 14px; font-size:14px; border-radius:12px;
      background:#3a3a3c; margin:0;
    }
    .itemHead{ display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
    .itemButtons{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }

    /* Alarm overlay */
    #alarm{
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:9999;
      flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:20px;
    }
    #alarm h2{ color:var(--danger); font-size:40px; margin:0 0 10px; }
    #alarm p{ color:#fff; opacity:.9; margin:0 0 18px; }
    #alarm .actions{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
    #alarm .actions button{ width:auto; padding:14px 22px; font-size:18px; border-radius:14px; margin-bottom:0; }

    /* Toast */
    .toast{
      position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(10px);
      background:#2c2c2e; color:#fff; padding:10px 18px; border-radius:16px;
      opacity:0; transition:.25s; pointer-events:none; z-index:10000;
    }
    .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

    /* audio preview */
    #preview{
      display:none;
      width:100%;
      margin-bottom:12px;
      border-radius:14px;
      background:#111;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Reminders</h1>
    <div class="build">Build: <b>push-step3-fixed</b></div>

    <div class="card">
      <label>Memo</label>
      <textarea id="task" placeholder="Write a note…"></textarea>

      <label>Date &amp; Time</label>
      <input id="time" type="datetime-local" />
      <div class="hint">Tap the gray bar to choose date + hours + minutes</div>

      <label>Voice note (optional)</label>
      <audio id="preview" controls></audio>
      <div class="row">
        <button id="startRec" class="danger" type="button">🎤 Start</button>
        <button id="stopRec" class="secondary" type="button" disabled>⏹ Stop</button>
      </div>

      <button id="saveBtn" type="button">Save</button>
      <button id="enableNotifBtn" class="secondary" type="button">🔔 Enable Notifications</button>

      <div class="hint">
        Tip: record → stop → you’ll see the player → then press Save.
      </div>
    </div>

    <div class="list" id="list"></div>
  </div>

  <div id="alarm">
    <h2 id="alarmTitle">ALARM</h2>
    <p id="alarmTime"></p>
    <div class="actions">
      <button id="snoozeBtn" class="secondary" type="button">Snooze 5 min</button>
      <button id="dismissBtn" class="danger" type="button">DISMISS</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
(() => {
  const STORAGE_KEY = "reminders_stable_v2";
  const DB_NAME  = "reminders_audio_db_v1";
  const DB_STORE = "audio";

  const $ = (id) => document.getElementById(id);

  const taskEl = $("task");
  const timeEl = $("time");
  const listEl = $("list");
  const toastEl = $("toast");

  const startRecBtn = $("startRec");
  const stopRecBtn  = $("stopRec");
  const saveBtn     = $("saveBtn");
  const enableNotifBtn = $("enableNotifBtn");

  const previewEl   = $("preview");

  const alarmEl     = $("alarm");
  const alarmTitle  = $("alarmTitle");
  const alarmTime   = $("alarmTime");
  const snoozeBtn   = $("snoozeBtn");
  const dismissBtn  = $("dismissBtn");

  // ---------- Toast
  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 2200);
  }

  // ---------- Set min datetime to now
  function updateMin(){
    const now = new Date();
    const local = new Date(now.getTime() - now.getTimezoneOffset()*60000).toISOString().slice(0,16);
    timeEl.min = local;
  }
  updateMin();
  setInterval(updateMin, 60000);

  // =========================================================
  // IndexedDB (audio storage)
  // =========================================================
  function openDb(){
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if(!db.objectStoreNames.contains(DB_STORE)){
          db.createObjectStore(DB_STORE);
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function idbSet(key, blob){
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, "readwrite");
      tx.objectStore(DB_STORE).put(blob, key);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }

  async function idbGet(key){
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, "readonly");
      const req = tx.objectStore(DB_STORE).get(key);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  }

  async function idbDel(key){
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, "readwrite");
      tx.objectStore(DB_STORE).delete(key);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }

  // =========================================================
  // Reminders storage
  // =========================================================
  function getAll(){
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  }
  function setAll(arr){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, m => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[m]));
  }

  // =========================================================
  // Render list
  // =========================================================
  async function playAudio(audioId){
    try{
      const blob = await idbGet(audioId);
      if(!blob){ toast("Voice note not found"); return; }

      const url = URL.createObjectURL(blob);
      previewEl.src = url;
      previewEl.style.display = "block";
      previewEl.play?.();
      toast("Playing voice note");
      setTimeout(() => URL.revokeObjectURL(url), 60000);
    } catch(e){
      console.error(e);
      toast("Could not play audio");
    }
  }

  function render(){
    const all = getAll().sort((a,b)=>a.timeMs-b.timeMs);
    if(all.length === 0){
      listEl.innerHTML = `<p style="text-align:center;color:#8e8e93;margin-top:18px;">No reminders yet.</p>`;
      return;
    }

    listEl.innerHTML = all.map(r => `
      <div class="item">
        <div class="itemHead">
          <div style="flex:1;">
            <strong>${escapeHtml(r.text)}</strong>
            <div class="time">${new Date(r.timeMs).toLocaleString()}</div>

            <div class="itemButtons">
              ${r.audioId ? `<button class="btnSmall" type="button" onclick="window.__play('${r.audioId}')">▶︎ Play voice</button>` : ``}
              <button class="btnSmall" type="button" onclick="window.__del(${r.id})">Delete</button>
            </div>
          </div>
        </div>
      </div>
    `).join("");
  }

  window.__play = (audioId) => playAudio(audioId);

  window.__del = async (id) => {
    const all = getAll();
    const item = all.find(x => x.id === id);
    setAll(all.filter(r => r.id !== id));
    if(item?.audioId){
      await idbDel(item.audioId).catch(()=>{});
    }
    toast("Deleted");
    render();
  };

  // =========================================================
  // Save reminder (attach audio if exists)
  // =========================================================
  let lastAudioId = null;

  saveBtn.addEventListener("click", () => {
    const timeValue = timeEl.value;
    if(!timeValue){ toast("Choose Date & Time"); return; }

    const ms = new Date(timeValue).getTime();
    if(ms <= Date.now()){ toast("Pick a future time"); return; }

    const text = taskEl.value.trim() || "Reminder";
    const reminder = { id: Date.now(), text, timeMs: ms, audioId: lastAudioId || null };

    const all = getAll();
    all.push(reminder);
    setAll(all);

    taskEl.value = "";
    timeEl.value = "";
    lastAudioId = null;

    previewEl.style.display = "none";
    previewEl.src = "";

    toast("Saved ✅");
    render();
  });

  // =========================================================
  // Alarm overlay (works ONLY while app is open)
  // =========================================================
  let audioCtx = null;
  let beepInterval = null;
  let alarmActive = false;
  let currentAlarmText = "";

  function ensureAudio(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === "suspended") audioCtx.resume();
  }
  window.addEventListener("touchstart", ensureAudio, { once:true });
  window.addEventListener("click", ensureAudio, { once:true });

  function startBeep(){
    ensureAudio();
    if(beepInterval) return;
    beepInterval = setInterval(() => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = "sine";
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    }, 600);
  }
  function stopBeep(){
    if(beepInterval){ clearInterval(beepInterval); beepInterval = null; }
  }

  function showAlarm(text, ms){
    alarmActive = true;
    currentAlarmText = text;
    alarmTitle.textContent = text;
    alarmTime.textContent = new Date(ms).toLocaleString();
    alarmEl.style.display = "flex";
    startBeep();
  }

  function hideAlarm(){
    stopBeep();
    alarmEl.style.display = "none";
    alarmActive = false;
  }

  dismissBtn.addEventListener("click", () => { hideAlarm(); render(); });

  snoozeBtn.addEventListener("click", () => {
    hideAlarm();
    const all = getAll();
    all.push({ id: Date.now(), text: currentAlarmText, timeMs: Date.now() + 5*60*1000 });
    setAll(all);
    toast("Snoozed 5 min");
    render();
  });

  setInterval(() => {
    if(alarmActive) return;
    const all = getAll();
    const now = Date.now();
    const due = all.filter(r => r.timeMs <= now).sort((a,b)=>a.timeMs-b.timeMs)[0];
    if(!due) return;

    setAll(all.filter(r => r.id !== due.id));
    render();
    showAlarm(due.text, due.timeMs);
  }, 1000);

  // =========================================================
  // Voice recording (fixed)
  // =========================================================
  let mediaRecorder = null;
  let streamRef = null;
  let chunks = [];

  function pickMime(){
    const candidates = ["audio/mp4", "audio/webm"];
    for(const t of candidates){
      if(window.MediaRecorder?.isTypeSupported?.(t)) return t;
    }
    return "";
  }

  startRecBtn.addEventListener("click", async () => {
    try{
      chunks = [];
      lastAudioId = null;

      streamRef = await navigator.mediaDevices.getUserMedia({ audio:true });

      const mime = pickMime();
      const options = mime ? { mimeType: mime } : undefined;

      mediaRecorder = new MediaRecorder(streamRef, options);

      mediaRecorder.ondataavailable = (e) => {
        if(e.data && e.data.size > 0) chunks.push(e.data);
      };

      mediaRecorder.onstop = async () => {
        try{
          streamRef?.getTracks?.().forEach(t => t.stop());
          streamRef = null;

          const finalType = mediaRecorder.mimeType || mime || "audio/mp4";
          const blob = new Blob(chunks, { type: finalType });
          chunks = [];

          if(!blob || blob.size === 0){
            toast("No audio saved. Try again.");
            return;
          }

          lastAudioId = "aud_" + Date.now();
          await idbSet(lastAudioId, blob);

          const url = URL.createObjectURL(blob);
          previewEl.src = url;
          previewEl.style.display = "block";

          toast("Voice note ready ✅");
          setTimeout(() => URL.revokeObjectURL(url), 60000);
        } catch(err){
          console.error(err);
          toast("Could not save audio");
        }
      };

      mediaRecorder.start(250);

      startRecBtn.disabled = true;
      stopRecBtn.disabled = false;
      toast("Recording…");
    } catch(e){
      console.error(e);
      toast("Mic permission blocked");
    }
  });

  stopRecBtn.addEventListener("click", () => {
    try{
      if(mediaRecorder && mediaRecorder.state === "recording"){
        mediaRecorder.stop();
      }
    } finally {
      startRecBtn.disabled = false;
      stopRecBtn.disabled = true;
      toast("Stopped");
    }
  });

  // =========================================================
  // Service Worker registration (must exist for push)
  // =========================================================
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js")
        .then(() => console.log("Service Worker registered"))
        .catch((err) => console.error("Service Worker error", err));
    });
  }

  // =========================================================
  // Push Notifications (Permission + Subscribe)
  // On iOS: permission prompt must be triggered by user tap [1](https://academy.insiderone.com/docs/web-push-support-for-mobile-safari)[2](https://www.developer-tech.com/news/ios-16-4-supports-web-app-notifications/)
  // =========================================================
  function urlBase64ToUint8Array(base64String) {
    const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
    const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
    const rawData = atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
    return outputArray;
  }

  const VAPID_PUBLIC_KEY = "PASTE_PUBLIC_KEY_HERE";
  const SERVER_URL = "https://ios-reminder-worker.dikla12.workers.dev";

  async function subscribeToPush() {
    // until Step 4, stop here with a clear message
    if (VAPID_PUBLIC_KEY.includes("PASTE_") || SERVER_URL.includes("PASTE_")) {
      toast("Step 4 needed: server not configured yet");
      return;
    }

    if (!("serviceWorker" in navigator)) { toast("Service Worker not supported"); return; }
    if (!("PushManager" in window)) { toast("Push not supported on this iPhone"); return; }

    const perm = await Notification.requestPermission();
    if (perm !== "granted") { toast("Notifications not allowed"); return; }

    const reg = await navigator.serviceWorker.ready;

    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });

    await fetch(`${SERVER_URL}/subscribe`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(sub)
    });

    toast("Notifications enabled ✅");
  }

  enableNotifBtn.addEventListener("click", () => {
    subscribeToPush().catch(err => {
      console.error(err);
      toast("Could not enable notifications");
    });
  });

  // boot
  render();
})();
</script>

</body>
</html>
