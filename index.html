<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Reminders" />

  <link rel="manifest" href="./manifest.webmanifest">
  <title>Reminders</title>

  <style>
    :root { --bg:#000; --card:#1c1c1e; --accent:#0a84ff; --danger:#ff453a; --text:#fff; }

    body {
      font-family: -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      padding-bottom: 120px;
      display: flex;
      justify-content: center;
    }
    .container { width:100%; max-width:420px; }

    h1 { margin-top:40px; font-size:32px; }

    .warning {
      background:#2c2c2e;
      border-left:3px solid #ff9f0a;
      border-radius:12px;
      padding:12px 16px;
      font-size:13px;
      color:#8e8e93;
      margin-bottom:16px;
    }

    .input-group {
      background:var(--card);
      padding:20px;
      border-radius:24px;
      margin-bottom:20px;
    }

    input {
      width:100%;
      background:#2c2c2e;
      border:none;
      border-radius:12px;
      padding:14px;
      color:white;
      font-size:16px;
      margin-bottom:12px;
    }

    .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }

    button {
      background:var(--accent);
      border:none;
      color:white;
      padding:14px;
      border-radius:14px;
      font-size:16px;
      font-weight:600;
    }
    .secondary { background:#3a3a3c; }
    .record { background:var(--danger); }

    .list .item {
      background:var(--card);
      padding:16px;
      border-radius:18px;
      margin-bottom:12px;
    }
    .time { font-size:13px; color:#8e8e93; }

    /* Overlay */
    #alarm {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.9);
      z-index:999;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
    }
    #alarm h2 { color:var(--danger); font-size:38px; }
    #alarm button { margin-top:20px; background:var(--danger); font-size:22px; }

    .toast {
      position:fixed;
      bottom:30px;
      left:50%;
      transform:translateX(-50%);
      background:#2c2c2e;
      padding:10px 20px;
      border-radius:16px;
      opacity:0;
      transition:.3s;
    }
    .toast.show { opacity:1; }
  </style>
</head>

<body>
<div class="container">
  <h1>Reminders</h1>

  <div class="warning">
    ⚠️ Alarm beeps only while app is open. Push will come later.
  </div>

  <div class="input-group">
    <input id="task" placeholder="Memo name…" />
    <input id="time" type="datetime-local" />

    <div class="row">
      <button class="secondary" onclick="quick(1)">+1h</button>
      <button class="secondary" onclick="quick(2)">+2h</button>
    </div>

    <div class="row">
      <button class="record" onclick="record()">🎤 Record</button>
      <button onclick="save()">Save</button>
    </div>
  </div>

  <div class="list" id="list"></div>
</div>

<div id="alarm">
  <h2 id="alarmTitle"></h2>
  <button onclick="stop()">DISMISS</button>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY="rems_v2";
let audioCtx, beep, recorder, chunks=[], voice=null;

const toast=m=>{const t=toastEl;t.innerText=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2000)};
const toastEl=document.getElementById("toast");

function quick(h){
  const d=new Date(); d.setHours(d.getHours()+h);
  time.value=new Date(d-d.getTimezoneOffset()*60000).toISOString().slice(0,16);
}

function save(){
  if(!time.value){toast("Pick a time");return}
  const r={id:Date.now(),t:task.value||"Reminder",ms:new Date(time.value).getTime(),v:voice};
  const a=JSON.parse(localStorage.getItem(KEY)||"[]"); a.push(r);
  localStorage.setItem(KEY,JSON.stringify(a));
  task.value=""; time.value=""; voice=null;
  toast("Saved ✅"); render();
}

function render(){
  list.innerHTML="";
  const a=JSON.parse(localStorage.getItem(KEY)||"[]").sort((x,y)=>x.ms-y.ms);
  a.forEach(r=>{
    list.innerHTML+=`<div class="item"><b>${r.t}</b><div class="time">${new Date(r.ms).toLocaleString()}</div></div>`;
  });
}

function tick(){
  const a=JSON.parse(localStorage.getItem(KEY)||"[]");
  const n=Date.now();
  const r=a.find(x=>x.ms<=n);
  if(!r) return;
  localStorage.setItem(KEY,JSON.stringify(a.filter(x=>x.id!==r.id)));
  alarmTitle.innerText=r.t;
  alarm.style.display="flex";
  audioCtx=new AudioContext();
  beep=setInterval(()=>{
    const o=audioCtx.createOscillator();
    o.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+.3);
  },600);
}

function stop(){
  clearInterval(beep); alarm.style.display="none"; render();
}

async function record(){
  if(recorder&&recorder.state==="recording"){
    recorder.stop(); return;
  }
  const s=await navigator.mediaDevices.getUserMedia({audio:true});
  recorder=new MediaRecorder(s);
  chunks=[];
  recorder.ondataavailable=e=>chunks.push(e.data);
  recorder.onstop=()=>{voice=new Blob(chunks); toast("Voice saved 🎤")};
  recorder.start(); toast("Recording…");
}

setInterval(tick,1000);
render();
</script>
</body>
</html>
