<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<title>Reminders</title>

<style>
:root {
  --bg:#000;
  --card:#1c1c1e;
  --accent:#0a84ff;
  --danger:#ff453a;
  --text:#fff;
  --muted:#8e8e93;
}

body {
  margin:0;
  padding:20px 20px 120px;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,sans-serif;
  display:flex;
  justify-content:center;
}

.container {
  width:100%;
  max-width:420px;
}

h1 {
  margin:40px 0 16px;
  font-size:32px;
}

.card {
  background:var(--card);
  padding:20px;
  border-radius:24px;
}

label {
  display:block;
  font-size:13px;
  color:var(--muted);
  margin-bottom:6px;
}

textarea,
input,
button {
  width:100%;
  box-sizing:border-box;
  border:none;
  border-radius:14px;
  padding:16px;
  font-size:16px;
  margin-bottom:12px;
}

textarea,
input {
  background:#2c2c2e;
  color:#fff;
}

textarea {
  min-height:70px;
  resize:none;
}

button {
  background:var(--accent);
  color:#fff;
  font-weight:600;
}

.list {
  margin-top:20px;
}

.item {
  background:var(--card);
  padding:16px;
  border-radius:18px;
  margin-bottom:12px;
}

.time {
  font-size:13px;
  color:var(--muted);
  margin-top:4px;
}

/* Alarm */
#alarm {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  z-index:999;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

#alarm h2 {
  color:var(--danger);
  font-size:38px;
  margin-bottom:12px;
}

#alarm button {
  margin-top:12px;
  width:auto;
  padding:14px 32px;
}
</style>
</head>

<body>
<div class="container">
  <h1>Reminders</h1>

  <div class="card">
    <label>Memo</label>
    <textarea id="task" placeholder="Write a note…"></textarea>

    <label>Date & Time</label>
    <input id="time" type="datetime-local" />

    <button id="saveBtn">Save</button>
  </div>

  <div class="list" id="list"></div>
</div>

<div id="alarm">
  <h2 id="alarmText"></h2>
  <button id="snoozeBtn">Snooze 5 min</button>
  <button id="dismissBtn">DISMISS</button>
</div>

<script>
/* ---------- State ---------- */
const STORAGE_KEY = "reminders_clean_v1";
let audioCtx = null;
let beepInterval = null;
let currentAlarmText = null;

/* ---------- Audio unlock (iOS critical) ---------- */
function unlockAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }
}
document.addEventListener("click", unlockAudio, { once:true });
document.addEventListener("touchstart", unlockAudio, { once:true });

/* ---------- Save ---------- */
document.getElementById("saveBtn").onclick = () => {
  const text = document.getElementById("task").value.trim();
  const timeValue = document.getElementById("time").value;

  if (!timeValue) {
    alert("Please choose Date & Time");
    return;
  }

  const reminder = {
    id: Date.now(),
    text: text || "Reminder",
    time: new Date(timeValue).getTime()
  };

  const all = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  all.push(reminder);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));

  document.getElementById("task").value = "";
  document.getElementById("time").value = "";

  render();
};

/* ---------- Render ---------- */
function render() {
  const list = document.getElementById("list");
  const all = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]")
    .sort((a,b) => a.time - b.time);

  list.innerHTML = "";

  all.forEach(r => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <strong>${r.text}</strong>
      <div class="time">${new Date(r.time).toLocaleString()}</div>
    `;
    list.appendChild(div);
  });
}

/* ---------- Alarm check ---------- */
setInterval(() => {
  const all = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  const now = Date.now();
  const due = all.find(r => r.time <= now);
  if (!due) return;

  localStorage.setItem(
    STORAGE_KEY,
    JSON.stringify(all.filter(r => r.id !== due.id))
  );

  triggerAlarm(due.text);
  render();
}, 1000);

/* ---------- Alarm ---------- */
function triggerAlarm(text) {
  unlockAudio();

  currentAlarmText = text;
  document.getElementById("alarmText").innerText = text;
  document.getElementById("alarm").style.display = "flex";

  beepInterval = setInterval(() => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
