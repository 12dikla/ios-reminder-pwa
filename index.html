<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Reminders" />

  <link rel="manifest" href="./manifest.webmanifest" />
  <title>Reminders</title>

  <style>
    :root { --bg:#000; --card:#1c1c1e; --accent:#0a84ff; --danger:#ff453a; --text:#fff; }

    body {
      font-family:-apple-system,sans-serif;
      background:var(--bg);
      color:var(--text);
      margin:0;
      padding:20px 20px 120px;
      display:flex;
      justify-content:center;
    }

    .container { width:100%; max-width:420px; }
    h1 { margin:40px 0 16px; font-size:32px; }

    .input-group {
      background:var(--card);
      padding:20px;
      border-radius:24px;
      margin-bottom:18px;
    }

    input[type="text"] {
      width:100%;
      background:#2c2c2e;
      border:none;
      border-radius:12px;
      padding:14px;
      color:#fff;
      font-size:16px;
      margin-bottom:12px;
      outline:none;
    }

    button {
      width:100%;
      border:none;
      border-radius:14px;
      padding:14px;
      font-size:16px;
      font-weight:600;
      color:#fff;
      background:var(--accent);
    }

    .secondary { background:#3a3a3c; }
    .record { background:var(--danger); }
    .recording { background:#ff7069; }

    .pickerBtn {
      background:#2c2c2e;
      text-align:left;
      margin-bottom:12px;
    }

    .pickerBtn span {
      display:block;
      font-size:13px;
      color:#8e8e93;
      margin-top:4px;
    }

    .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

    #alarm {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.9);
      z-index:999;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
    }

    #alarm h2 { color:var(--danger); font-size:38px; }
    #alarm button { margin-top:12px; }

    .toast {
      position:fixed;
      bottom:30px;
      left:50%;
      transform:translateX(-50%);
      background:#2c2c2e;
      padding:10px 18px;
      border-radius:16px;
      opacity:0;
      transition:.25s;
      pointer-events:none;
    }

    .toast.show { opacity:1; }
  </style>
</head>

<body>
<div class="container">
  <h1>Reminders</h1>

  <div class="input-group">
    <input id="task" placeholder="Memo name…" />

    <button id="timeBtn" class="pickerBtn" onclick="openPicker()">
      Choose date & time
      <span id="timeLabel">No time selected</span>
    </button>

    <input id="timeInput" type="datetime-local"
           style="position:absolute; left:-9999px;" />

    <div class="row">
      <button id="recBtn" class="record" onclick="toggleRecording()">🎤 Record</button>
      <button onclick="save()">Save</button>
    </div>
  </div>
</div>

<div id="alarm">
  <h2 id="alarmTitle"></h2>
  <button class="secondary" onclick="snooze()">Snooze 5 min</button>
  <button class="record" onclick="dismiss()">DISMISS</button>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------- Toast ---------- */
const toast = msg => {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
};

/* ---------- Date / Time ---------- */
const timeInput = document.getElementById("timeInput");
const timeLabel = document.getElementById("timeLabel");

function openPicker() {
  timeInput.showPicker?.();
  timeInput.focus();
}

timeInput.addEventListener("change", () => {
  timeLabel.textContent = new Date(timeInput.value).toLocaleString();
});

/* ---------- Recording ---------- */
let mediaRecorder = null;
let isRecording = false;
let audioData = null;

async function toggleRecording() {
  const btn = document.getElementById("recBtn");

  if (!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
      mediaRecorder = new MediaRecorder(stream);
      const chunks = [];

      mediaRecorder.ondataavailable = e => chunks.push(e.data);
      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(chunks);
        const reader = new FileReader();
        reader.onload = () => audioData = reader.result;
        reader.readAsDataURL(blob);
        toast("Voice saved 🎤");
      };

      mediaRecorder.start();
      isRecording = true;
      btn.textContent = "🛑 Stop";
      btn.classList.add("recording");

    } catch {
      toast("Microphone permission blocked");
    }
  } else {
    mediaRecorder.stop();
    isRecording = false;
    btn.textContent = "🎤 Record";
    btn.classList.remove("recording");
  }
}

/* ---------- Alarm + Snooze ---------- */
let currentAlarm = null;
let beepTimer = null;

function triggerAlarm(text) {
  currentAlarm = text;
  document.getElementById("alarmTitle").textContent = text;
  document.getElementById("alarm").style.display = "flex";
  beepTimer = setInterval(() => new AudioContext().createOscillator().start(), 600);
}

function snooze() {
  clearInterval(beepTimer);
  document.getElementById("alarm").style.display = "none";
  setTimeout(() => triggerAlarm(currentAlarm), 5 * 60 * 1000);
}

function dismiss() {
  clearInterval(beepTimer);
  document.getElementById("alarm").style.display = "none";
}

/* ---------- Save ---------- */
function save() {
  if (!timeInput.value) return toast("Choose date & time");
  toast("Saved ✅");
}
</script>
</body>
</html>
